<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO LIST</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">
</head>

<body>
    <main>
        <section>
            <header class="container">Minha Lista de Tarefas</header>
            <p id="funcionamento" class="container">Clique duas vezes em um item para marcá-lo como completo</p>
            <input type="text" id="texto-tarefa" autofocus placeholder="Tarefas">
            <ol id="lista-tarefas" class="list-group"></ol>
        </section>
        <section id="botao">
            <button id="criar-tarefa" class="btn btn-outline-success">Adicionar Tarefa</button>
            <button id="mover-cima" class="btn btn-outline-info">&uArr;</button>
            <button id="mover-baixo" class="btn btn-outline-info">&dArr;</button>
            <button id="salvar-tarefas" class="btn btn-outline-success">Salvar Tarefas</button>
            <button id="remover-selecionado" class="btn btn-outline-danger">Remover Selecionado</button>
            <button id="remover-finalizados" class="btn btn-outline-danger">Remover Finalizados</button>
            <button id="apaga-tudo" class="btn btn-outline-danger">Remover Tudo</button>
        </section>
    </main>
</body>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous">
</script>

</html>
